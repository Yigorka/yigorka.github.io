<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game | Yehor Ivanov</title>
    <meta name="description" content="Game details for projects by Yehor Ivanov." />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="bg-glow glow-3"></div>

    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">Yehor Ivanov</a>

            <nav class="nav">
                <a href="index.html#games">Games</a>
                <a href="index.html#about">About</a>
                <a href="index.html#publishing">Publishing</a>
                <a href="index.html#contact">Contact</a>
            </nav>

            <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">
                <span class="theme-toggle-icon">🌙</span>
            </button>
        </div>
    </header>

    <main class="container game-page">
        <div class="back-link-wrap">
            <a class="back-link" href="index.html#games">← Back to games</a>
        </div>

        <section id="gameContent"></section>
    </main>

    <script src="games.js"></script>
    <script>
        function setupTheme() {
            const body = document.body;
            const themeToggle = document.getElementById("themeToggle");
            const themeIcon = document.querySelector(".theme-toggle-icon");
            const savedTheme = localStorage.getItem("theme");

            if (savedTheme === "dark") {
                body.classList.add("dark-theme");
                themeIcon.textContent = "☀️";
            } else {
                themeIcon.textContent = "🌙";
            }

            themeToggle.addEventListener("click", () => {
                body.classList.toggle("dark-theme");

                if (body.classList.contains("dark-theme")) {
                    localStorage.setItem("theme", "dark");
                    themeIcon.textContent = "☀️";
                } else {
                    localStorage.setItem("theme", "light");
                    themeIcon.textContent = "🌙";
                }
            });
        }

        function getGameBySlug(slug) {
            return GAMES.find(game => game.slug === slug);
        }

        function createStoreButtons(game) {
            const buttons = [];

            if (game.appStoreUrl && game.appStoreUrl !== "#") {
                buttons.push(`
          <a class="btn btn-secondary" href="${game.appStoreUrl}" target="_blank" rel="noopener noreferrer">
            Download on the App Store
          </a>
        `);
            }

            if (game.googlePlayUrl && game.googlePlayUrl !== "#") {
                buttons.push(`
          <a class="btn btn-primary" href="${game.googlePlayUrl}" target="_blank" rel="noopener noreferrer">
            Get it on Google Play
          </a>
        `);
            }

            if (game.privacyUrl) {
                buttons.push(`
          <a class="btn btn-secondary" href="${game.privacyUrl}">
            Privacy Policy
          </a>
        `);
            }

            if (buttons.length === 0) {
                buttons.push(`
          <span class="btn btn-disabled">
            Store page coming soon
          </span>
        `);
            }

            return buttons.join("");
        }

        function renderGamePage() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get("slug");
            const game = getGameBySlug(slug);
            const container = document.getElementById("gameContent");

            if (!game) {
                container.innerHTML = `
          <section class="not-found-card">
            <p class="section-label">Error</p>
            <h1>Game not found</h1>
            <p class="hero-text">
              The requested project could not be found.
            </p>
            <a href="index.html#games" class="btn btn-primary">Go back</a>
          </section>
        `;
                return;
            }

            document.title = `${game.title} | Yehor Ivanov`;

            const tags = game.tags.map(tag => `<span>${tag}</span>`).join("");
            const platforms = game.platforms.map(platform => `<span class="platform-pill">${platform}</span>`).join("");
            const publisherRows = game.publisherNames.map(item => `
        <div class="meta-box">
          <div class="info-title">${item.store}</div>
          <div class="info-value">${item.name}</div>
        </div>
      `).join("");

            container.innerHTML = `
        <section class="game-hero">
          <div class="game-hero-media" style="background:${game.thumbGradient};">
            <div class="game-hero-media-inner">
              ${game.image
                    ? `<img
                      src="${game.image}"
                      alt="${game.title} icon"
                      class="game-hero-icon"
                      onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                    />
                    <div class="game-hero-fallback" style="display:none;">${game.shortTitle}</div>`
                    : `<div class="game-hero-fallback">${game.shortTitle}</div>`
                }
            </div>
          </div>

          <div class="game-hero-info">
            <div class="badge">${game.statusLabel}</div>
            <h1>${game.title}</h1>
            <p class="hero-text">${game.description}</p>

            <div class="platform-pills">${platforms}</div>
            <div class="tags tags-large">${tags}</div>

            <div class="store-buttons">
              ${createStoreButtons(game)}
            </div>
          </div>
        </section>

        <section class="section game-details-section">
          <div class="section-head">
            <p class="section-label">Details</p>
            <h2>Project information</h2>
          </div>

          <div class="details-grid">
            <div class="details-card">
              <h3>Overview</h3>
              <p>${game.longDescription}</p>
            </div>

            <div class="details-card">
              <h3>Status</h3>
              <p>${game.statusDescription}</p>
            </div>

            <div class="details-card full-width">
              <h3>Store names</h3>
              <div class="meta-grid">
                ${publisherRows}
              </div>
            </div>
          </div>
        </section>
      `;
        }

        setupTheme();
        renderGamePage();
    </script>
</body>

</html>
